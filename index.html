<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <!-- FORÇAR ATUALIZAÇÃO (ANTI-CACHE) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video, iframe {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

  <!-- Vídeo -->
  <video id="player" autoplay muted playsinline></video>

  <!-- Power BI -->
  <iframe id="powerbi"></iframe>

  <script>
    // Lista de vídeos
    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    // 🔽 COLE AQUI O LINK DE VISUALIZAÇÃO DO POWER BI
    const powerBiUrl = "https://app.powerbi.com/groups/ee34ed51-2cab-4114-8f7c-da29d63cd6d5/reports/844b26b7-8c75-49fa-8ee5-471a362b1f3b?ctid=3e20ecb2-9cb0-4df1-ad7b-914e31dcdda4&pbi_source=linkShare";

    let indice = 0;
    const player = document.getElementById("player");
    const powerbi = document.getElementById("powerbi");

    // Força atualização do vídeo (anti-cache)
    function videoComTimestamp(video) {
      return video + "?v=" + new Date().getTime();
    }

    function tocarVideo() {
      powerbi.style.display = "none";

      player.src = videoComTimestamp(videos[indice]);
      player.style.display = "block";
      player.load();
      player.play().catch(()=>{});
    }

    function mostrarPowerBI() {
      player.pause();
      player.style.display = "none";

      powerbi.src = powerBiUrl;
      powerbi.style.display = "block";

      // ⏱ Tempo do Power BI na tela (ex: 30 segundos)
      setTimeout(() => {
        indice = 0;
        tocarVideo();
      }, 30000);
    }

    player.addEventListener("ended", () => {
      indice++;
      if (indice < videos.length) {
        tocarVideo();
      } else {
        mostrarPowerBI();
      }
    });

    // Inicia
    tocarVideo();

    // 🔁 AUTO-ATUALIZAÇÃO DA PÁGINA (10 minutos)

      location.reload(true);
