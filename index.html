<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <!-- FORÇAR ATUALIZAÇÃO (ANTI-CACHE) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* Container do vídeo */
    #videoContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 70px); /* espaço da faixa */
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Faixa de clima */
    #weatherBar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #0b3a6e;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    #weatherBar iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <!-- Vídeo -->
  <div id="videoContainer">
    <video id="player" autoplay muted playsinline></video>
  </div>

  <!-- Faixa de previsão do tempo -->
 <div id="weatherBar">
  <iframe 
    src="https://wttr.in/Cosmópolis?format=%c+%t+%C&lang=pt"
    style="width:100%;height:100%;border:none;">
  </iframe>
</div>

  <script>
    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    let indice = 0;
    const player = document.getElementById("player");

    function videoComTimestamp(video) {
      return video + "?v=" + new Date().getTime();
    }

    function tocarVideo() {
      player.src = videoComTimestamp(videos[indice]);
      player.load();
      player.play().catch(()=>{});
    }

    player.addEventListener("ended", () => {
      indice = (indice + 1) % videos.length;
      tocarVideo();
    });

    tocarVideo();
  </script>

</body>
</html>
