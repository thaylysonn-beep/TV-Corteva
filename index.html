<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TV Institucional</title>

  <!-- ANTI CACHE -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

  <video id="player" autoplay muted playsinline></video>

  <script>

    // =========================
    // LISTA DE VÍDEOS
    // =========================
    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    // =========================
    // CONTROLE
    // =========================
    let indice = 0;

    const player = document.getElementById("player");

    // =========================
    // GERA URL SEM CACHE
    // =========================
    function gerarUrlSemCache(video) {

      // força o navegador buscar novamente
      return `${video}?nocache=${Date.now()}`;

    }

    // =========================
    // TOCAR VÍDEO
    // =========================
    function tocarVideo() {

      const videoAtual = gerarUrlSemCache(videos[indice]);

      player.src = videoAtual;

      player.load();

      player.play().catch((erro) => {
        console.log("Erro ao reproduzir:", erro);
      });

    }

    // =========================
    // QUANDO TERMINAR O VIDEO
    // =========================
    player.addEventListener("ended", () => {

      indice++;

      if (indice >= videos.length) {
        indice = 0;
      }

      tocarVideo();

    });

    // =========================
    // INICIA
    // =========================
    tocarVideo();

    // =========================
    // FORÇA ATUALIZAÇÃO TOTAL
    // DA PÁGINA A CADA 5 MIN
    // =========================
    setInterval(() => {

      // limpa cache do vídeo
      player.pause();
      player.removeAttribute("src");
      player.load();

      // recarrega página
      window.location.reload(true);

    }, 300000);

  </script>

</body>

</html>
