<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <video id="player" autoplay muted playsinline></video>

  <script>
    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    let indice = 0;
    const player = document.getElementById("player");

    function tocarVideo() {
      player.src = videos[indice];
      player.load();
      player.play();
    }

    player.onended = () => {
      indice = (indice + 1) % videos.length;
      tocarVideo();
    };

    tocarVideo();
  </script>

</body>
</html>
