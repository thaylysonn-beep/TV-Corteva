<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <!-- FORÇAR ATUALIZAÇÃO (ANTI-CACHE) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* Área do vídeo */
    #videoContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 70px); /* espaço reservado para a faixa */
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Faixa do clima */
    #weatherBar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: #0b3a6e;

      /* CLIMA COMO BACKGROUND (mais estável para TV Samsung) */
      background-image: url("https://wttr.in/Cosmopolis.png?format=%c+%t&lang=pt");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;

      overflow: hidden;
    }
  </style>
</head>

<body>

  <!-- Vídeo -->
  <div id="videoContainer">
    <video id="player" autoplay muted playsinline></video>
  </div>

  <!-- Faixa clima -->
  <div id="weatherBar"></div>

  <script>
    /* Lista de vídeos */
    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    let indice = 0;
    const player = document.getElementById("player");

    function videoComTimestamp(video) {
      return video + "?v=" + Date.now();
    }

    function tocarVideo() {
      player.src = videoComTimestamp(videos[indice]);
      player.currentTime = 0;
      player.play().catch(() => {});
    }

    player.addEventListener("ended", () => {
      indice = (indice + 1) % videos.length;
      tocarVideo();
    });

    /* Inicia o primeiro vídeo */
    tocarVideo();
  </script>

</body>
</html>
``
