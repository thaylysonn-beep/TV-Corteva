<script>

const videos = [
  "video1.mp4",
  "video2.mp4"
];

let indice = 0;

const player = document.getElementById("player");

// versão automática baseada em tempo
function gerarUrlAtualizada(video) {

  // muda a cada 5 minutos
  const versao = Math.floor(Date.now() / 300000);

  return `${video}?v=${versao}`;

}

function tocarVideo() {

  const videoAtual = gerarUrlAtualizada(videos[indice]);

  player.src = videoAtual;

  player.load();

  player.play().catch((erro) => {
    console.log("Erro ao reproduzir:", erro);
  });

}

player.addEventListener("ended", () => {

  indice++;

  if (indice >= videos.length) {
    indice = 0;
  }

  tocarVideo();

});

// caso erro no vídeo
player.addEventListener("error", () => {

  console.log("Erro no vídeo.");

  indice++;

  if (indice >= videos.length) {
    indice = 0;
  }

  tocarVideo();

});

// inicia
tocarVideo();

// atualiza automaticamente a cada 10 minutos
setInterval(() => {

  console.log("Atualizando conteúdo...");

  tocarVideo();

}, 600000);

</script>
