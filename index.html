<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <!-- Anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* preenche a tela 16:9 */
    }
  </style>
</head>

<body>

  <video id="player" muted playsinline></video>

  <script>
    const videos = [
      "video1.mp4",
      "video2.mp4",
      "video3.mp4"
    ];

    let indice = 0;
    const player = document.getElementById("player");

    function tocarVideo() {
      const src = videos[indice] + "?v=" + Date.now();
      player.src = src;
      player.currentTime = 0;
      player.play().catch(()=>{});
    }

    player.addEventListener("ended", () => {
      indice = (indice + 1) % videos.length;
      tocarVideo();
    });

    // inicia
    tocarVideo();

    // 🔁 Atualiza a página automaticamente (10 minutos)
    setInterval(() => {
      location.reload(true);
    }, 10 * 60 * 1000);
  </script>

</body>
</html>
