<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TV Institucional</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

  <video id="player" autoplay muted playsinline></video>

  <script>

    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    let indice = 0;

    const player = document.getElementById("player");

    function tocarVideo() {

      // adiciona cache leve
      player.src = videos[indice] + "?v=" + new Date().getMinutes();

      player.play();

    }

    // próximo vídeo
    player.onended = function () {

      indice++;

      if (indice >= videos.length) {
        indice = 0;
      }

      tocarVideo();

    };

    // se der erro pula
    player.onerror = function () {

      indice++;

      if (indice >= videos.length) {
        indice = 0;
      }

      tocarVideo();

    };

    // inicia
    tocarVideo();

    // atualiza a página inteira a cada 1 hora
    setInterval(function () {

      location.reload();

    }, 3600000);

  </script>

</body>

</html>
