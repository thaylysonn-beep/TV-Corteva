<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <!-- Anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* Área do vídeo */
    #videoContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 70px);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Faixa do clima */
    #weatherBar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #0b3a6e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #weatherBar img {
      height: 70px;
      width: auto;
      display: block;
    }
  </style>
</head>

<body>

  <!-- Vídeo -->
  <div id="videoContainer">
    <video id="player" autoplay muted playsinline></video>
  </div>

  <!-- Clima -->
  <div id="weatherBar">
    <img src="https://wttr.in/Cosmopolis.png?format=%c+%t&lang=pt">
  </div>

  <script>
    const videos = [
      "video1.mp4",
      "video2.mp4"
    ];

    let indice = 0;
    const player = document.getElementById("player");

    function videoComTimestamp(video) {
      return video + "?v=" + Date.now();
    }

    function tocarVideo() {
      player.src = videoComTimestamp(videos[indice]);
      player.currentTime = 0;
      player.play().catch(()=>{});
    }

    player.addEventListener("ended", () => {
      indice = (indice + 1) % videos.length;
      tocarVideo();
    });

    tocarVideo();
  </script>

</body>
</html>
``
