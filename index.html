<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TV Institucional</title>

  <!-- Anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .bg-video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .main-video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="container">
    <video id="bg" class="bg-video" muted playsinline></video>
    <video id="main" class="main-video" muted playsinline></video>
  </div>

  <script>
    const videos = [
      "video1.mp4",
      "video2.mp4",
      "video3.mp4"
    ];

    let indice = 0;

    const bg = document.getElementById("bg");
    const main = document.getElementById("main");

    function trocarVideo() {
      const src = videos[indice] + "?v=" + Date.now();

      bg.src = src;
      main.src = src;

      bg.currentTime = 0;
      main.currentTime = 0;

      bg.play().catch(()=>{});
      main.play().catch(()=>{});
    }

    main.addEventListener("ended", () => {
      indice = (indice + 1) % videos.length;
      trocarVideo();
    });

    // Inicia
    trocarVideo();

    // 🔁 AUTO-ATUALIZAÇÃO DA PÁGINA (a cada 10 minutos)
    setInterval(() => {
      location.reload(true);
    }, 10 * 60 * 1000);
  </script>
</body>
</html>
